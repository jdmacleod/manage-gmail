# Industry / org-specific sender rules for prune.sh.
#
# Copy this file to prune_industry_senders.local.conf (gitignored — never
# committed) and replace the examples below with senders from your own
# mailbox.
#
# Format: one rule per line.
#
#   label<TAB>addr1 addr2 addr3 ...
#
# The label is used as the category name in PRUNE_LOG.md and the interactive
# prompt. The addresses become a Gmail "from:(addr1 OR addr2 OR ...)" query
# fragment. Multiple addresses for a single rule go on one line, separated
# by spaces.
#
# Each rule uses the same age threshold as OLD_UPDATES_AGE (set at the top
# of prune.sh — default 6m) and the same -is:starred -in:trash guards.
#
# Blank lines and lines starting with # are ignored.
#
# Examples (replace with your own):
Old industry association newsletters	info@example-industry-org.com newsletters@example-guild.org
Old professional society digests	updates@example-society.org info@example-chapter.org
