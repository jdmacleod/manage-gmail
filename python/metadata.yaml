# Datasette configuration for the Gmail mbox SQLite database.
#
# Usage (from the python/ directory):
#   uv run datasette serve gmail.db --metadata metadata.yaml --open
#
# The "queries" section pre-loads useful queries into Datasette's
# Query menu.  Edit freely — changes take effect on the next page load
# (no server restart needed in Datasette 0.64+).
#
# To add a saved query: duplicate any block below, give it a unique key
# (the YAML key becomes the URL slug), and set title + sql.
#
# datasette-vega is installed as a dependency and adds a "Vega" chart tab
# to any query result.  Select a query, click Vega, pick chart type and axes.

title: Gmail Archive
description_html: >
  Gmail Takeout mbox imported with
  <a href="https://github.com/your-repo/manage-gmail">manage-gmail</a>.
  Use the Query menu for pre-built analyses, or write your own SQL.

databases:
  gmail:
    tables:
      messages:
        sort_desc: date_ts
        # Columns shown by default in the table view; technical columns are
        # hidden (still accessible via SQL and the full row view).
        hidden_columns:
          - headers_json
          - mbox_offset
          - mbox_size
          - references_hdr
          - x_received
          - bcc_raw
          - delivered_to
          - content_type
        # Facets let you filter the table by clicking a value.
        facets:
          - year_month
          - from_email
          - is_unread
          - is_starred
          - in_inbox
          - in_sent
          - in_trash
          - has_attachments
        label_column: subject

    queries:

      # -----------------------------------------------------------------------
      # Volume / overview
      # -----------------------------------------------------------------------

      by_month:
        title: "Message volume by month"
        sql: |
          SELECT
            year_month,
            COUNT(*)                                            AS total,
            SUM(is_unread)                                      AS unread,
            SUM(is_starred)                                     AS starred,
            SUM(CASE WHEN in_inbox = 1 THEN 1 ELSE 0 END)     AS inbox,
            SUM(CASE WHEN in_sent  = 1 THEN 1 ELSE 0 END)     AS sent,
            SUM(has_attachments)                                AS with_attachments
          FROM   messages
          WHERE  year_month IS NOT NULL
          GROUP  BY year_month
          ORDER  BY year_month DESC

      by_year:
        title: "Message volume by year"
        sql: |
          SELECT
            year,
            COUNT(*)                                            AS total,
            SUM(is_unread)                                      AS unread,
            SUM(is_starred)                                     AS starred,
            SUM(CASE WHEN in_inbox = 1 THEN 1 ELSE 0 END)     AS inbox,
            SUM(CASE WHEN in_sent  = 1 THEN 1 ELSE 0 END)     AS sent,
            SUM(has_attachments)                                AS with_attachments
          FROM   messages
          WHERE  year IS NOT NULL
          GROUP  BY year
          ORDER  BY year DESC

      received_per_year:
        title: "Emails received per calendar year"
        sql: |
          SELECT
            year,
            COUNT(*)          AS received,
            SUM(is_unread)    AS still_unread,
            SUM(is_starred)   AS starred
          FROM   messages
          WHERE  year IS NOT NULL
            AND  (in_sent = 0 OR in_sent IS NULL)
          GROUP  BY year
          ORDER  BY year DESC

      sent_per_year:
        title: "Emails sent per calendar year"
        sql: |
          SELECT
            year,
            COUNT(*)  AS sent
          FROM   messages
          WHERE  year IS NOT NULL
            AND  in_sent = 1
          GROUP  BY year
          ORDER  BY year DESC

      by_day_of_week:
        title: "Message volume by day of week"
        sql: |
          SELECT
            CASE strftime('%w', date_ts, 'unixepoch')
              WHEN '0' THEN '0 – Sun'
              WHEN '1' THEN '1 – Mon'
              WHEN '2' THEN '2 – Tue'
              WHEN '3' THEN '3 – Wed'
              WHEN '4' THEN '4 – Thu'
              WHEN '5' THEN '5 – Fri'
              WHEN '6' THEN '6 – Sat'
            END                 AS day_of_week,
            COUNT(*)            AS total,
            SUM(CASE WHEN in_sent = 0 OR in_sent IS NULL THEN 1 ELSE 0 END) AS received,
            SUM(CASE WHEN in_sent = 1 THEN 1 ELSE 0 END)                    AS sent
          FROM   messages
          WHERE  date_ts IS NOT NULL
          GROUP  BY day_of_week
          ORDER  BY day_of_week

      by_hour_of_day:
        title: "Message volume by hour of day (UTC)"
        sql: |
          SELECT
            CAST(strftime('%H', date_ts, 'unixepoch') AS INTEGER)  AS hour_utc,
            COUNT(*)            AS total,
            SUM(CASE WHEN in_sent = 0 OR in_sent IS NULL THEN 1 ELSE 0 END) AS received,
            SUM(CASE WHEN in_sent = 1 THEN 1 ELSE 0 END)                    AS sent
          FROM   messages
          WHERE  date_ts IS NOT NULL
          GROUP  BY hour_utc
          ORDER  BY hour_utc

      # -----------------------------------------------------------------------
      # Senders
      # -----------------------------------------------------------------------

      top_senders:
        title: "Top senders by message count"
        sql: |
          SELECT
            from_email,
            from_name,
            COUNT(*)                                            AS message_count,
            SUM(is_unread)                                      AS unread,
            SUM(is_starred)                                     AS starred,
            datetime(MIN(date_ts), 'unixepoch')                AS first_seen,
            datetime(MAX(date_ts), 'unixepoch')                AS last_seen
          FROM   messages
          WHERE  from_email IS NOT NULL
          GROUP  BY from_email
          ORDER  BY message_count DESC
          LIMIT  200

      top_senders_inbox:
        title: "Top senders in Inbox"
        sql: |
          SELECT
            from_email,
            from_name,
            COUNT(*)                                            AS message_count,
            SUM(is_unread)                                      AS unread,
            datetime(MAX(date_ts), 'unixepoch')                AS last_message
          FROM   messages
          WHERE  in_inbox = 1 AND from_email IS NOT NULL
          GROUP  BY from_email
          ORDER  BY message_count DESC
          LIMIT  200

      top_senders_trash:
        title: "Top senders in Trash (unsubscribe candidates)"
        sql: |
          SELECT
            from_email,
            from_name,
            COUNT(*)                                            AS trashed_count,
            datetime(MAX(date_ts), 'unixepoch')                AS last_trashed
          FROM   messages
          WHERE  in_trash = 1 AND from_email IS NOT NULL
          GROUP  BY from_email
          ORDER  BY trashed_count DESC
          LIMIT  100

      storage_by_sender:
        title: "Storage footprint by sender"
        sql: |
          SELECT
            from_email,
            from_name,
            COUNT(*)                                                AS message_count,
            printf('%.1f MB', SUM(body_size_bytes) / 1048576.0)   AS total_size,
            printf('%.1f KB', AVG(body_size_bytes) / 1024.0)      AS avg_size,
            SUM(body_size_bytes)                                    AS total_bytes
          FROM   messages
          WHERE  from_email IS NOT NULL
          GROUP  BY from_email
          ORDER  BY total_bytes DESC
          LIMIT  100

      # -----------------------------------------------------------------------
      # Inbox / flags
      # -----------------------------------------------------------------------

      unread_inbox:
        title: "Unread inbox messages (newest first)"
        sql: |
          SELECT
            datetime(date_ts, 'unixepoch')  AS date,
            from_email,
            from_name,
            subject,
            labels,
            message_id
          FROM   messages
          WHERE  in_inbox = 1 AND is_unread = 1
          ORDER  BY date_ts DESC
          LIMIT  500

      starred:
        title: "Starred messages"
        sql: |
          SELECT
            datetime(date_ts, 'unixepoch')  AS date,
            from_email,
            subject,
            labels,
            message_id
          FROM   messages
          WHERE  is_starred = 1
          ORDER  BY date_ts DESC
          LIMIT  500

      oldest_unread:
        title: "Oldest unread messages"
        sql: |
          SELECT
            datetime(date_ts, 'unixepoch')  AS date,
            from_email,
            subject,
            labels,
            message_id
          FROM   messages
          WHERE  is_unread = 1
          ORDER  BY date_ts ASC
          LIMIT  200

      # -----------------------------------------------------------------------
      # Threads
      # -----------------------------------------------------------------------

      busiest_threads:
        title: "Most active threads (by message count)"
        sql: |
          SELECT
            thread_id,
            COUNT(*)                                            AS message_count,
            datetime(MIN(date_ts), 'unixepoch')                AS started,
            datetime(MAX(date_ts), 'unixepoch')                AS last_message,
            COUNT(DISTINCT from_email)                          AS participants,
            MAX(subject)                                        AS subject
          FROM   messages
          WHERE  thread_id IS NOT NULL
          GROUP  BY thread_id
          ORDER  BY message_count DESC
          LIMIT  100

      # -----------------------------------------------------------------------
      # Size / attachments
      # -----------------------------------------------------------------------

      largest_messages:
        title: "Largest messages (by raw mbox size)"
        sql: |
          SELECT
            datetime(date_ts, 'unixepoch')  AS date,
            from_email,
            subject,
            printf('%.1f MB', body_size_bytes / 1048576.0)     AS size,
            body_size_bytes,
            has_attachments,
            attachment_names,
            message_id
          FROM   messages
          ORDER  BY body_size_bytes DESC
          LIMIT  100

      with_attachments:
        title: "Messages with attachments (newest first)"
        sql: |
          SELECT
            datetime(date_ts, 'unixepoch')  AS date,
            from_email,
            subject,
            attachment_names,
            printf('%.1f MB', body_size_bytes / 1048576.0)     AS size,
            message_id
          FROM   messages
          WHERE  has_attachments = 1
          ORDER  BY date_ts DESC
          LIMIT  500

      attachment_types:
        title: "Attachment file types (by extension)"
        sql: |
          SELECT
            LOWER(
              CASE WHEN INSTR(value, '.') > 0
                THEN SUBSTR(value, INSTR(value, '.') + 1)
                ELSE '(no extension)'
              END
            )                   AS extension,
            COUNT(*)            AS count
          FROM   messages, json_each(attachment_names)
          WHERE  attachment_names IS NOT NULL
          GROUP  BY extension
          ORDER  BY count DESC
          LIMIT  50

      # -----------------------------------------------------------------------
      # Labels
      # -----------------------------------------------------------------------

      by_label:
        title: "Message count by Gmail label"
        sql: |
          SELECT
            value               AS label,
            COUNT(*)            AS message_count
          FROM   messages, json_each(labels)
          WHERE  labels IS NOT NULL
          GROUP  BY label
          ORDER  BY message_count DESC

      # -----------------------------------------------------------------------
      # Sent mail
      # -----------------------------------------------------------------------

      top_recipients:
        title: "Most-emailed recipients (from Sent)"
        sql: |
          SELECT
            to_raw,
            COUNT(*)                                            AS sent_count,
            datetime(MAX(date_ts), 'unixepoch')                AS last_sent
          FROM   messages
          WHERE  in_sent = 1 AND to_raw IS NOT NULL
          GROUP  BY to_raw
          ORDER  BY sent_count DESC
          LIMIT  100

      # -----------------------------------------------------------------------
      # Inbox health
      # -----------------------------------------------------------------------

      inbox_age_buckets:
        title: "Inbox debt by age bucket"
        sql: |
          SELECT
            CASE
              WHEN date_ts >= strftime('%s','now','-7 days')   THEN '1 – this week'
              WHEN date_ts >= strftime('%s','now','-30 days')  THEN '2 – this month'
              WHEN date_ts >= strftime('%s','now','-180 days') THEN '3 – 1–6 months'
              WHEN date_ts >= strftime('%s','now','-365 days') THEN '4 – 6–12 months'
              ELSE                                                   '5 – over a year'
            END                       AS age_bucket,
            COUNT(*)                  AS messages,
            SUM(is_unread)            AS unread
          FROM   messages
          WHERE  in_inbox = 1
          GROUP  BY age_bucket
          ORDER  BY age_bucket

      unread_by_sender:
        title: "Unread messages per sender (newsletter hygiene)"
        sql: |
          SELECT
            from_email,
            from_name,
            COUNT(*)                                          AS total_received,
            SUM(is_unread)                                    AS unread,
            printf('%.0f%%', SUM(is_unread)*100.0/COUNT(*))  AS unread_pct,
            datetime(MAX(date_ts),'unixepoch')                AS last_message
          FROM   messages
          WHERE  (in_sent = 0 OR in_sent IS NULL)
            AND  from_email IS NOT NULL
          GROUP  BY from_email
          HAVING unread > 0
          ORDER  BY unread DESC
          LIMIT  200

      sender_domain_volume:
        title: "Message volume by sender domain"
        sql: |
          SELECT
            LOWER(SUBSTR(from_email, INSTR(from_email,'@')+1))  AS domain,
            COUNT(DISTINCT from_email)                            AS distinct_addresses,
            COUNT(*)                                              AS message_count,
            SUM(is_unread)                                        AS unread,
            datetime(MAX(date_ts),'unixepoch')                    AS last_message
          FROM   messages
          WHERE  from_email LIKE '%@%'
          GROUP  BY domain
          ORDER  BY message_count DESC
          LIMIT  100

      one_way_threads:
        title: "Threads you never replied to (broadcast/prune candidates)"
        sql: |
          SELECT
            r.thread_id,
            COUNT(*)                                      AS received_count,
            MAX(r.subject)                                AS subject,
            r.from_email                                  AS primary_sender,
            datetime(MAX(r.date_ts),'unixepoch')          AS last_received
          FROM   messages r
          WHERE  (r.in_sent = 0 OR r.in_sent IS NULL)
            AND  r.thread_id IS NOT NULL
            AND  r.thread_id NOT IN (
                   SELECT DISTINCT thread_id FROM messages WHERE in_sent = 1
                 )
          GROUP  BY r.thread_id
          ORDER  BY received_count DESC
          LIMIT  200

      monthly_unread_rate:
        title: "Unread rate trend by month"
        sql: |
          SELECT
            year_month,
            COUNT(*)                                                  AS received,
            SUM(is_unread)                                            AS unread,
            printf('%.1f%%', SUM(is_unread)*100.0/COUNT(*))          AS unread_rate
          FROM   messages
          WHERE  year_month IS NOT NULL
            AND  (in_sent = 0 OR in_sent IS NULL)
          GROUP  BY year_month
          ORDER  BY year_month DESC

      # -----------------------------------------------------------------------
      # Import health
      # -----------------------------------------------------------------------

      import_summary:
        title: "Import progress / status"
        sql: |
          SELECT
            mbox_path,
            printf('%.2f GB', mbox_size_bytes / 1073741824.0)  AS mbox_size,
            messages_imported,
            printf('%.1f%%', last_offset * 100.0 / mbox_size_bytes) AS pct_done,
            started_at,
            updated_at,
            COALESCE(completed_at, '(in progress)')            AS completed_at
          FROM   import_progress
          ORDER  BY id DESC

      messages_without_date:
        title: "Messages with unparseable Date headers"
        sql: |
          SELECT message_id, from_email, subject, date_str, mbox_offset
          FROM   messages
          WHERE  date_ts IS NULL
          ORDER  BY mbox_offset
          LIMIT  200

  # -----------------------------------------------------------------------
  # classifications.db — AI classifier results
  # Run: uv run datasette serve gmail.db classifications.db --metadata metadata.yaml
  # -----------------------------------------------------------------------

  classifications:
    tables:
      classifications:
        sort_desc: true
        sort: classified_at
        facets:
          - model
          - prompt_version
          - label

    queries:

      label_distribution:
        title: "AI label distribution by model and version"
        sql: |
          SELECT
            model,
            prompt_version,
            label,
            COUNT(*)                                          AS count,
            printf('%.1f%%', COUNT(*) * 100.0 / SUM(COUNT(*)) OVER (PARTITION BY model, prompt_version)) AS pct
          FROM   classifications
          GROUP  BY model, prompt_version, label
          ORDER  BY model, prompt_version, label

      uncertain_rate_by_version:
        title: "Uncertain rate by prompt version (single-model gate)"
        sql: |
          SELECT
            prompt_version,
            model,
            SUM(CASE WHEN label = 'uncertain' THEN 1 ELSE 0 END) AS uncertain,
            COUNT(*)                                               AS total,
            printf('%.1f%%',
              SUM(CASE WHEN label = 'uncertain' THEN 1 ELSE 0 END) * 100.0 / COUNT(*)
            )                                                      AS uncertain_rate,
            CASE
              WHEN SUM(CASE WHEN label = 'uncertain' THEN 1 ELSE 0 END) * 1.0 / COUNT(*) > 0.30
              THEN 'WARN: refine prompt before Stage 3'
              ELSE 'OK'
            END                                                    AS gate_status
          FROM   classifications
          GROUP  BY prompt_version, model
          ORDER  BY prompt_version, model

      disagreement_heatmap:
        title: "Model disagreement rate by email category (Stage 3)"
        sql: |
          -- Requires: the three-model Stage 3 run to be complete.
          -- Joins classifications.db against gmail.db labels via message_id.
          -- Each row is a (message_id, prompt_version) where at least two models disagree.
          SELECT
            c.prompt_version,
            COUNT(DISTINCT c.message_id)                           AS total_messages,
            SUM(CASE WHEN c.disagree = 1 THEN 1 ELSE 0 END)      AS disagreements,
            printf('%.1f%%',
              SUM(CASE WHEN c.disagree = 1 THEN 1 ELSE 0 END) * 100.0
              / NULLIF(COUNT(DISTINCT c.message_id), 0)
            )                                                       AS disagreement_rate
          FROM (
            SELECT
              message_id,
              prompt_version,
              CASE WHEN COUNT(DISTINCT label) > 1 THEN 1 ELSE 0 END AS disagree
            FROM classifications
            GROUP BY message_id, prompt_version
          ) c
          GROUP BY c.prompt_version
          ORDER BY c.prompt_version

      ensemble_verdict:
        title: "Ensemble verdict — unanimous keep / delete / uncertain"
        sql: |
          SELECT
            prompt_version,
            verdict,
            COUNT(*)  AS messages,
            printf('%.1f%%', COUNT(*)*100.0/SUM(COUNT(*)) OVER (PARTITION BY prompt_version)) AS pct
          FROM (
            SELECT
              message_id,
              prompt_version,
              CASE
                WHEN COUNT(DISTINCT label) = 1 AND MAX(label) = 'keep'      THEN 'unanimous keep'
                WHEN COUNT(DISTINCT label) = 1 AND MAX(label) = 'delete'    THEN 'unanimous delete'
                WHEN COUNT(DISTINCT label) = 1 AND MAX(label) = 'uncertain' THEN 'all uncertain'
                ELSE 'disagreement'
              END  AS verdict
            FROM   classifications
            GROUP  BY message_id, prompt_version
          )
          GROUP  BY prompt_version, verdict
          ORDER  BY prompt_version, verdict

      outlier_by_model:
        title: "Outlier votes by model (which model disagrees most)"
        sql: |
          SELECT
            c.prompt_version,
            c.model,
            COUNT(*)  AS outlier_votes
          FROM   classifications c
          JOIN (
            SELECT message_id, prompt_version, COUNT(DISTINCT label) AS label_count
            FROM   classifications
            GROUP  BY message_id, prompt_version
            HAVING label_count > 1
          ) d ON c.message_id = d.message_id AND c.prompt_version = d.prompt_version
          JOIN (
            SELECT message_id, prompt_version, label AS majority_label
            FROM   classifications
            GROUP  BY message_id, prompt_version
            HAVING COUNT(*) - COUNT(DISTINCT label) >= 1
              AND  COUNT(label) - COUNT(DISTINCT label) > 0
          ) m ON c.message_id = m.message_id AND c.prompt_version = m.prompt_version
          WHERE  c.label != m.majority_label
          GROUP  BY c.prompt_version, c.model
          ORDER  BY c.prompt_version, outlier_votes DESC

      high_confidence_disagreements:
        title: "High-confidence disagreements (priority review queue)"
        sql: |
          -- Messages where models disagree AND at least one confidence >= 0.9.
          -- Highest-value manual review: a confident wrong vote is the worst error.
          SELECT
            c.message_id,
            c.prompt_version,
            GROUP_CONCAT(c.model || ':' || c.label || '(' || ROUND(c.confidence,2) || ')', '  ')
              AS votes,
            MAX(c.confidence)  AS max_confidence
          FROM   classifications c
          JOIN (
            SELECT message_id, prompt_version
            FROM   classifications
            GROUP  BY message_id, prompt_version
            HAVING COUNT(DISTINCT label) > 1
          ) d ON c.message_id = d.message_id AND c.prompt_version = d.prompt_version
          GROUP  BY c.message_id, c.prompt_version
          HAVING MAX(c.confidence) >= 0.9
          ORDER  BY max_confidence DESC, c.prompt_version
          LIMIT  200

      confidence_distribution:
        title: "Confidence score histogram by model and label"
        sql: |
          SELECT
            model,
            prompt_version,
            label,
            ROUND(CAST(CAST(confidence*10 AS INT) AS REAL)/10, 1)  AS confidence_bucket,
            COUNT(*)                                                 AS count
          FROM   classifications
          GROUP  BY model, prompt_version, label, confidence_bucket
          ORDER  BY model, prompt_version, label, confidence_bucket

      label_drift_by_model:
        title: "Per-model DELETE rate across prompt versions (regression check)"
        sql: |
          SELECT
            model,
            prompt_version,
            COUNT(*)                                                                   AS total,
            SUM(CASE WHEN label='delete'    THEN 1 ELSE 0 END)                        AS deletes,
            SUM(CASE WHEN label='keep'      THEN 1 ELSE 0 END)                        AS keeps,
            SUM(CASE WHEN label='uncertain' THEN 1 ELSE 0 END)                        AS uncertain,
            printf('%.1f%%', SUM(CASE WHEN label='delete' THEN 1 ELSE 0 END)*100.0/COUNT(*))
              AS delete_rate
          FROM   classifications
          GROUP  BY model, prompt_version
          ORDER  BY model, prompt_version

      corrections_error_rate:
        title: "Prompt version error rate against human corrections"
        sql: |
          -- Measures how often the model's label differs from the human correction.
          -- A prompt version is ready for live deployment when error_rate < 5%.
          -- Run this query after reviewing uncertain cases with --review-uncertain.
          --
          -- NOTE: This query requires corrections.jsonl to be imported as a table.
          -- Use: sqlite-utils insert corrections.db corrections corrections.jsonl --nl
          -- then: uv run datasette serve gmail.db classifications.db corrections.db ...
          SELECT
            'Load corrections.jsonl into corrections.db to use this query' AS instructions
